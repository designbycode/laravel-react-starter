name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/pest

  dusk:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        id: chromedriver
        uses: browser-actions/setup-chromedriver@v1

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Prepare SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=database/database.sqlite" >> .env
          echo "APP_URL=http://127.0.0.1:8000" >> .env

      - name: Build Assets
        run: npm run build

      - name: Migrate
        run: php artisan migrate --no-interaction -v

      - name: Start Server
        run: php artisan serve --host=127.0.0.1 --port=8000 > storage/logs/serve.log 2>&1 &

      - name: Start ChromeDriver
        run: |
          chromedriver --version
          chromedriver --port=9515 > storage/logs/chromedriver.log 2>&1 &

      - name: Run Dusk Tests
        env:
          APP_URL: http://127.0.0.1:8000
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          DUSK_DRIVER_URL: http://127.0.0.1:9515
        run: php artisan dusk --colors --filter=Avatar
